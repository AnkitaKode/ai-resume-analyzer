name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths: [ 'ai-resume-analyzer-frontend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'ai-resume-analyzer-frontend/**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ai-resume-analyzer-frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd ai-resume-analyzer-frontend
        npm ci
    
    - name: Run tests
      run: |
        cd ai-resume-analyzer-frontend
        npm test -- --coverage --watchAll=false
    
    - name: Build
      run: |
        cd ai-resume-analyzer-frontend
        npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ai-resume-analyzer-frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd ai-resume-analyzer-frontend
        npm ci
    
    - name: Build
      run: |
        cd ai-resume-analyzer-frontend
        npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ai-resume-analyzer-frontend/build
